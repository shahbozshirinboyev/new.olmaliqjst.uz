{% extends 'base.html' %}
{% block title %}Kafedralar{% endblock %}
{% block content %}
<section class="card">
    <h1>Kafedralar ro'yxati</h1>
    {% for department in departments %}
        <div class="item">
            <h3><a href="{% url 'departments:department_detail' department.slug %}">{{ department.name }}</a></h3>
            <p>Kafedra mudiri: {{ department.head_name }}</p>
        </div>
    {% empty %}
        <p>Kafedralar mavjud emas.</p>
    {% endfor %}
</section>
{% endblock %}
