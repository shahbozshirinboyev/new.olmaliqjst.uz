{% extends 'base.html' %}
{% block title %}{{ book.title }}{% endblock %}
{% block content %}
<section class="card">
    <h1>{{ book.title }}</h1>
    <p><strong>Muallif:</strong> {{ book.author }}</p>
    <p><strong>Kategoriya:</strong> {{ book.category.name }}</p>
    <p>{{ book.description|linebreaks }}</p>
    {% if book.pdf_file %}<p><a href="{{ book.pdf_file.url }}">PDF yuklab olish</a></p>{% endif %}
</section>
{% endblock %}
