{% extends 'base.html' %}
{% block title %}{{ news.title }}{% endblock %}
{% block content %}
<section>
    <!-- Header -->
    <div class="mt-5 mt-md-3 mt-lg-2">
        <h2 class="fw-bold text-uppercase mb-1">{{ news.title }}</h2>
        <p class="text-muted small">{{ news.published_at }} | Ko'rishlar: {{ news.views_count }}</p>
    </div>

    <div>
        <img src="{{ news.image.url }}" alt="{{ news.name }}" class="w-100"
            style="height: auto; object-fit: cover; object-position: 0% 25%;">
        <p class="lh-base" style="text-align: justify;">{{ news.content|linebreaks }}</p>
        <hr class="mt-5">
        <p>Tayyorlagan: {{ news.author }}</p>
    </div>
</section>
{% endblock %}
