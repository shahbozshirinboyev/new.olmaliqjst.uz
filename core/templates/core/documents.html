{% extends 'base.html' %}
{% block title %}Me'yoriy hujjatlar{% endblock %}
{% block content %}
<section class="card">
    <h1>Me'yoriy hujjatlar</h1>
    {% for doc in documents %}
        <p>
            <a href="{{ doc.file.url }}">{{ doc.title }}</a>
            {% if doc.published_at %} ({{ doc.published_at }}){% endif %}
        </p>
    {% empty %}
        <p>Hujjatlar mavjud emas.</p>
    {% endfor %}
</section>
{% endblock %}
